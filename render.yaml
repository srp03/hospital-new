services:
  - type: web
    name: hospital-ms-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
    disk:
      name: uploads-storage
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1
